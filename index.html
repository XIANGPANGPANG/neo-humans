<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Neo-Humans 新人类——与 AI 共同成长、共同进化。">
  <title>Neo-Humans / 新人类</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#c2703f; --ink:#1d1d1f; --muted:#6e6e73; --paper:#fbfbfd; }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; overflow-x:hidden; background:var(--paper); color:var(--ink); font-family:Inter,"Noto Sans SC",sans-serif; -webkit-font-smoothing:antialiased; }
    ::selection { background:var(--accent); color:#fff; }
    nav { position:fixed; inset:0 0 auto; z-index:30; height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(20px,5vw,64px); background:rgba(251,251,253,.8); backdrop-filter:blur(14px); border-bottom:1px solid rgba(0,0,0,.07); }
    .brand { font-size:14px; font-weight:600; letter-spacing:.01em; }
    .brand span { color:#86868b; font-weight:400; }
    button { border:0; background:none; padding:6px 10px; color:var(--ink); font:500 13px inherit; cursor:pointer; }
    .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:120px clamp(20px,6vw,64px) 80px; text-align:center; }
    .eyebrow { margin-bottom:28px; color:var(--accent); font-size:14px; font-weight:600; letter-spacing:.02em; }
    h1 { max-width:16ch; margin:0; font-size:clamp(34px,7.2vw,92px); font-weight:600; line-height:1.08; letter-spacing:-.02em; }
    .lead { max-width:34ch; margin:32px 0 0; color:var(--muted); font-size:clamp(17px,2.1vw,24px); line-height:1.6; }
    .scroll-line { width:1px; height:56px; margin-top:72px; background:linear-gradient(transparent,rgba(29,29,31,.33)); }
    section.reveal { opacity:0; transform:translateY(24px) scale(.98); transition:opacity 1s ease,transform 1s ease; }
    section.reveal.visible { opacity:1; transform:none; }
    .idea { max-width:760px; margin:auto; padding:140px clamp(20px,6vw,64px); text-align:center; }
    .label { margin-bottom:24px; color:#86868b; font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
    h2 { margin:0 0 32px; font-size:clamp(26px,4vw,44px); font-weight:600; line-height:1.3; letter-spacing:-.01em; }
    .body-copy { margin:0 0 20px; color:#424245; font-size:clamp(16px,1.7vw,19px); line-height:1.8; }
    .timeline { max-width:920px; margin:auto; padding:0 clamp(20px,6vw,64px) 160px; }
    .nodes { display:flex; align-items:center; justify-content:center; }
    .node-wrap { display:flex; flex:1; align-items:center; }
    .node { display:flex; flex-shrink:0; flex-direction:column; align-items:center; gap:16px; }
    .mark { color:#c7c7cc; font-size:24px; font-weight:300; letter-spacing:-.02em; }
    .mark.ai { color:var(--accent); font-size:30px; font-weight:700; }
    .node-label { color:#86868b; font-size:13px; font-weight:500; white-space:nowrap; }
    .connector { flex:1; height:1px; margin:0 16px 26px; background:rgba(0,0,0,.1); }
    .who { padding:160px clamp(20px,6vw,64px); background:#0b0b0c; color:#f5f5f7; text-align:center; }
    .who .label { color:#98989d; }
    .who h2 { max-width:26ch; margin-left:auto; margin-right:auto; }
    .who .body-copy { max-width:44ch; margin:0 auto 24px; color:#a1a1a6; }
    .who .strong { margin:0; color:var(--accent); font-size:clamp(18px,2vw,23px); font-weight:600; line-height:1.6; }
    .vision { max-width:900px; margin:auto; padding:180px clamp(20px,6vw,64px) 200px; text-align:center; }
    .vision p { margin:0 0 16px; font-size:clamp(24px,4vw,52px); font-weight:600; line-height:1.35; letter-spacing:-.02em; }
    .vision p:last-child { margin:0; color:var(--accent); }
    footer { max-width:1100px; margin:auto; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:20px; padding:48px clamp(20px,6vw,64px) 56px; border-top:1px solid rgba(0,0,0,.08); color:#86868b; font-size:13px; }
    footer span:last-child { color:var(--ink); font-weight:500; }
    @media (max-width:600px) { .nodes { align-items:flex-start; } .connector { margin:16px 6px 0; } .node-label { font-size:11px; } }
    @media (prefers-reduced-motion:reduce) { html { scroll-behavior:auto; } section.reveal { opacity:1; transform:none; transition:none; } }
  </style>
</head>
<body>
  <nav><div class="brand">Neo-Humans <span>新人类</span></div><button id="lang" type="button" aria-label="Switch language">EN</button></nav>
  <main>
    <section class="hero">
      <div class="eyebrow">新人类 · NEO-HUMANS</div>
      <h1 data-k="hero1"></h1><p class="lead" data-k="hero2"></p><div class="scroll-line"></div>
    </section>
    <section class="idea reveal">
      <div class="label" data-k="ideaLabel"></div><h2 data-k="ideaTitle"></h2>
      <p class="body-copy" data-k="ideaP1"></p><p class="body-copy" data-k="ideaP2"></p>
    </section>
    <section class="timeline reveal"><div class="nodes" id="nodes"></div></section>
    <section class="who reveal">
      <div class="label" data-k="whoLabel"></div><h2 data-k="whoTitle"></h2>
      <p class="body-copy" data-k="whoP1"></p><p class="strong" data-k="whoP2"></p>
    </section>
    <section class="vision reveal">
      <div class="label" data-k="visionLabel"></div><p data-k="vision1"></p><p data-k="vision2"></p>
    </section>
  </main>
  <footer><span>Neo-Humans / 新人类 &nbsp;·&nbsp; neo-humans.com</span><span data-k="footer"></span></footer>
  <script>
    const copy = {
      zh:{hero1:'AI 不是替代人类，而是人类进化的外挂。',hero2:'我们是第一批与 AI 共同成长、共同进化的人类——Neo-Humans。',ideaLabel:'理念',ideaTitle:'人类的进化史，是一部不断“外接”能力的历史。',ideaP1:'从学会使用工具的那一刻起，人类就在为自己外挂能力——语言外挂了记忆，文字外挂了传承，互联网外挂了信息。',ideaP2:'而今天，AI 正在成为人类历史上最强大的一次外挂：它外挂的不是某项技能，而是思考、创造与决策本身。',nodes:['语言','文字','互联网','AI'],whoLabel:'我们是谁',whoTitle:'Neo-Humans（新人类），指的是这样一群人。',whoP1:'他们不恐惧 AI，不观望 AI，而是主动拥抱 AI、驾驭 AI，把 AI 内化为自己能力的一部分。',whoP2:'这不是科幻，这是正在发生的进化。',visionLabel:'愿景',vision1:'未来的竞争力，不在于“人 vs AI”，',vision2:'而在于“会用 AI 的人 vs 不会用 AI 的人”。',footer:'进化，正在发生。'},
      en:{hero1:"AI isn't replacing humanity — it's humanity's plug-in for evolution.",hero2:'We are the first generation growing up alongside AI. We are Neo-Humans.',ideaLabel:'The Idea',ideaTitle:'The history of human evolution is a history of plugging in new abilities.',ideaP1:"From the moment we learned to use tools, we've been extending ourselves — language plugged in memory, writing plugged in continuity, the internet plugged in information itself.",ideaP2:"Today, AI is becoming the most powerful plug-in in human history. It doesn't just extend a single skill — it extends thinking, creation, and decision-making itself.",nodes:['Language','Writing','Internet','AI'],whoLabel:'Who We Are',whoTitle:'Neo-Humans are people who don’t fear AI or wait on the sidelines.',whoP1:'They embrace it, master it, and make it part of who they are.',whoP2:"This isn't science fiction. This is evolution, happening now.",visionLabel:'Vision',vision1:"The future's dividing line isn't “human vs. AI.”",vision2:'It’s “those who use AI vs. those who don’t.”',footer:'Evolution, happening now.'}
    };
    let language = 'zh';
    const render = () => {
      const text = copy[language]; document.documentElement.lang = language === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-k]').forEach(el => { el.textContent = text[el.dataset.k]; });
      document.querySelector('#lang').textContent = language === 'zh' ? 'EN' : '中文';
      document.querySelector('#nodes').innerHTML = text.nodes.map((label,i) => `<div class="node-wrap"><div class="node"><div class="mark ${i===3?'ai':''}">${i===3?'AI':String(i+1).padStart(2,'0')}</div><div class="node-label">${label}</div></div>${i<3?'<div class="connector"></div>':''}</div>`).join('');
    };
    document.querySelector('#lang').addEventListener('click', () => { language = language === 'zh' ? 'en' : 'zh'; render(); });
    if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const observer = new IntersectionObserver(entries => entries.forEach(entry => { if(entry.isIntersecting){ entry.target.classList.add('visible'); observer.unobserve(entry.target); } }), {threshold:.15});
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }
    render();
  </script>
</body>
</html>
